name: Daily AI News Fetch

on:
  schedule:
    # Every day at 08:00 UTC (09:00 Spain time)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual execution

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch and generate AI news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        timeout-minutes: 12
        run: node scripts/fetch-news.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI News Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Auto: noticias IA $(date +'%Y-%m-%d')"
          git push
