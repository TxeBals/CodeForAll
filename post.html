  <script>
  (async function() {
    var params = new URLSearchParams(window.location.search);
    var slug = params.get('slug');
    if (!slug) { window.location.href = 'index.html'; return; }

    try {
      var res = await fetch('data/posts.json');
      var data = await res.json();
      var post = data.posts.find(function(p) { return p.slug === slug; });

      if (!post) {
        document.getElementById('postContent').innerHTML = '<p>Post no encontrado</p>';
        return;
      }

      // Update page title and meta tags
      document.title = post.title + ' - Code 4 All';
      var metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.content = post.description;
      var ogTitle = document.querySelector('meta[property="og:title"]');
      if (ogTitle) ogTitle.content = post.title;
      var ogDesc = document.querySelector('meta[property="og:description"]');
      if (ogDesc) ogDesc.content = post.description;
      var ogUrl = document.querySelector('meta[property="og:url"]');
      if (ogUrl) ogUrl.content = 'https://txemagonzalez.com/post.html?slug=' + slug;
      var twTitle = document.querySelector('meta[name="twitter:title"]');
      if (twTitle) twTitle.content = post.title;
      var twDesc = document.querySelector('meta[name="twitter:description"]');
      if (twDesc) twDesc.content = post.description;

      // Render title
      document.getElementById('title').textContent = post.title;

      // Render meta info
      var metaHtml = '<p class="meta">' +
        '<span><i class="icon-calendar mr-2"></i>' + (post.dateDisplay || post.date) + '</span>' +
        '<span><i class="icon-folder-o mr-2"></i>' + post.folder + '</span>' +
        '</p>';
      document.getElementById('postMeta').innerHTML = metaHtml;

      // Show auto-generated banner if applicable
      if (post.autoGenerated) {
        var banner = document.getElementById('autoGenBanner');
        banner.style.display = 'flex';
        if (post.sourceUrl) {
          var sourceLink = document.getElementById('autoGenSource');
          sourceLink.href = post.sourceUrl;
          sourceLink.textContent = (post.sourceName || 'Fuente original');
        }
      }

      // Render content
      var contentHtml = '';
      if (post.content) {
        post.content.forEach(function(block) {
          switch (block.type) {
            case 't':
              contentHtml += '<h2 class="mb-3 mt-5">' + block.text + '</h2>';
              break;
            case 'code':
              contentHtml += '<pre><code>' + block.text + '</code></pre>';
              break;
            case 'p':
            default:
              if (block.text && block.text.trim() !== '') {
                contentHtml += '<p>' + block.text + '</p>';
              }
              break;
          }
        });
      }
      document.getElementById('postContent').innerHTML = contentHtml;

      // Render tags
      var tagContainer = document.getElementById('tags');
      if (post.tags) {
        post.tags.forEach(function(tag) {
          var el = document.createElement('a');
          el.href = '#';
          el.className = 'tag-cloud-link';
          el.textContent = tag;
          tagContainer.appendChild(el);
        });
      }

    } catch (e) {
      console.error('Error loading post:', e);
      document.getElementById('postContent').innerHTML = '<p>Error cargando el post.</p>';
    }
  })();
  </script>
