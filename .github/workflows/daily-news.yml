name: Daily AI News Fetch

on:
  schedule:
    # Every day at 08:00 UTC (09:00 Spain time)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual execution

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch and generate AI news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        timeout-minutes: 12
        run: node scripts/fetch-news.js

      - name: Commit and push changes
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI News Bot"
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "⚠️ Sin cambios. No se commitea."
          else
            git commit -m "🤖 Auto: noticias IA $(date +'%Y-%m-%d')"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Cambios commiteados y pusheados"
          fi

      - name: Post summary to LinkedIn
        if: steps.commit.outputs.has_changes == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
        run: node scripts/post-linkedin.js
